<!doctype html>
<html>
  <head>
    <title>Story game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
      }
      .options_buttons {
        background-color: rgb(210, 191, 251);
        text-align: center;
        border-radius: 40%;
        padding: 15px 1px;
        width: 100px;
        height: 80px;
      }
      .questions_answers {
        background-color: olivedrab;
        text-align: center;
        min-height: 70vh;
        /* Flexbox (layout method) to ajust elements in a container vercally and horizontally */
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
      }
      .options_buttons_div {
        display: flex;
        flex-direction: row;
        justify-content: space-evenly;
        /* margin-top: 12%; */
      }
    </style>
  </head>
  <header style="background-color: darkgreen; padding: 20px 20px">
    <h1 style="text-align: center">Story game</h1>
  </header>
  <body>
    <div style="background-color: forestgreen">
      <h2 style="text-align: center">Forest adventure</h2>
      <p style="text-align: center"><i>Choose Your Own Adventure ...</i></p>
    </div>
    <div class="questions_answers">
      <p id="question">
        <i>
          You just got lost in the middle of a magic Forest. What will you
          do?</i
        >
      </p>

      <div class="options_buttons_div">
        <button class="options_buttons" id="option_1" onclick="goToNextScene()">
          I will the place to my left
        </button>
        <button class="options_buttons" id="option_2" onclick="goToNextScene()">
          I will the place to my right
        </button>
      </div>
    </div>
    <script>
      let currentScene = 0;
      function goToNextScene() {
        console.log(currentScene);
        if (currentScene == 0) {
          document.getElementById("question").innerHTML =
            "A glowing path appears in the forest and you follow it. It leads to a directional sign that splits into two. Where will you go?";
          document.getElementById("option_1").innerText =
            "Where it says ocean beach";
          document.getElementById("option_2").innerText =
            "Where it says small village";
          currentScene = currentScene + 1;
        } else if (currentScene == 1) {
          document.getElementById("question").innerHTML =
            "On your way you found a magical creature and somehow you feel that it is calling you. What will you do?";
          document.getElementById("option_1").innerText =
            "I'll ignore it and keep going";
          document.getElementById("option_2").innerText =
            "I'll follow it into the unknown";
          currentScene = currentScene + 1;
        } else if (currentScene == 2) {
          document.getElementById("question").innerHTML =
            "It leads to his friend. He is hurt, and needs help. What will you do?";
          document.getElementById("option_1").innerText =
            "I'll freeze and do nothing";
          document.getElementById("option_2").innerText =
            "I'll do my best to help the magical creature";
          currentScene = currentScene + 1;
        } else if (currentScene == 3) {
          document.getElementById("question").innerHTML =
            "You were able to help him, and he'll be okay. They are going somewhere and you are following them. It leads to a magic door saying home. what will you do?";
          document.getElementById("option_1").innerText =
            "I'll open it to go home";
          document.getElementById("option_2").innerText =
            "I'll stay here in the magic florest";
          currentScene = currentScene + 1;
        } else if (currentScene == 4) {
          document.getElementById("question").innerHTML =
            "That's the end of our adventure. Till next one!";
          // document.getElementById("option_2").hidden;
        }
      }
    </script>
  </body>
  <footer style="background-color: darkgreen">
    <p style="text-align: right"><i>by Carol Lanzu 26.1</i></p>
  </footer>
</html>
